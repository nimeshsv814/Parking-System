services:
  mongo:
    image: mongo:7
    container_name: smart-parking-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "4001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  parking-service:
    build: ./services/parking-service
    container_name: parking-service
    restart: unless-stopped
    env_file:
      - ./services/parking-service/.env
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "4002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  booking-service:
    build: ./services/booking-service
    container_name: booking-service
    restart: unless-stopped
    env_file:
      - ./services/booking-service/.env
    depends_on:
      mongo:
        condition: service_healthy
      parking-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    expose:
      - "4003"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    restart: unless-stopped
    env_file:
      - ./services/payment-service/.env
    depends_on:
      mongo:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    expose:
      - "4004"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4004/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  scheduler-service:
    build: ./services/scheduler-service
    container_name: scheduler-service
    restart: unless-stopped
    env_file:
      - ./services/scheduler-service/.env
    depends_on:
      booking-service:
        condition: service_healthy
    expose:
      - "4005"

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    restart: unless-stopped
    env_file:
      - ./services/notification-service/.env
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "4006"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4006/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    container_name: smart-parking-frontend
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      parking-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mongo_data:
